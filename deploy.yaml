apiVersion: apps/v1
kind: Deployment 
metadata:
  name: lok-deploy
  labels:
    app: app-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-dev
  template: 
    metadata:
      labels: 
        app: app-dev
    spec: 
      containers: 
        - name: image
          image: lokeshkoagiri/simpletimeservice                                                              
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
      
